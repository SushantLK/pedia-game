<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARYA - Pedia Conference 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;800&display=swap');

        :root {
            --bg-bright: #ffffff;
            --bg-cloud: #f0f7ff;
            --primary-glow: #00e5ff; 
            --secondary-glow: #ff00ff; 
            --win-gold: #ffca28; 
            --lose-pink: #ff1744; 
        }

        body { 
            background-color: var(--bg-bright);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(0, 229, 255, 0.25) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 255, 0.15) 0%, transparent 40%),
                linear-gradient(135deg, var(--bg-cloud) 0%, #ffffff 100%);
            display: flex; height: 100vh; margin: 0; 
            font-family: 'Poppins', sans-serif; overflow: hidden;
            color: #333;
        }

        #game-layout {
            display: flex; width: 100%; height: 100%;
            align-items: center; justify-content: space-around;
            padding: 0 5%; box-sizing: border-box;
        }

        #left-panel { flex: 1.2; display: flex; flex-direction: column; align-items: center; position: relative; }

        #wheel-wrapper {
            position: relative; padding: 25px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            border: 2px solid rgba(0, 229, 255, 0.4);
            box-shadow: 0 0 80px rgba(0, 229, 255, 0.3);
            animation: pulse-border 4s infinite alternate;
        }

        @keyframes pulse-border {
            from { box-shadow: 0 0 60px rgba(0, 229, 255, 0.3); }
            to { box-shadow: 0 0 100px rgba(255, 0, 255, 0.2); }
        }

        #wheel-outer-ring {
            position: relative; width: 620px; height: 620px;
            border-radius: 50%; background: #ffffff;
            padding: 10px; display: flex; align-items: center; justify-content: center;
            border: 10px solid #222;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
        }

        #pointer {
            position: absolute; top: -35px; left: 50%;
            transform: translateX(-50%); width: 0; height: 0;
            border-left: 35px solid transparent; border-right: 35px solid transparent;
            border-top: 65px solid #ff1744; 
            filter: drop-shadow(0 0 15px #ff1744); z-index: 20;
        }

        #center-pin {
            position: absolute; width: 95px; height: 95px;
            background: #fff;
            border-radius: 50%; z-index: 15;
            border: 6px solid #222; 
            display: flex; align-items: center; justify-content: center;
            font-family: 'Orbitron'; font-size: 16px; font-weight: 900;
        }

        canvas { width: 100%; height: 100%; border-radius: 50%; }

        #spin-btn {
            margin-top: 50px; padding: 25px 100px;
            font-size: 32px; font-family: 'Orbitron', sans-serif; font-weight: 900;
            background: linear-gradient(135deg, #00d2ff 0%, #ff00ff 100%);
            color: white; border: none; border-radius: 100px;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 40px rgba(255, 0, 255, 0.3);
            text-transform: uppercase; letter-spacing: 5px;
            border: 3px solid #fff;
        }

        #spin-btn:hover { transform: scale(1.08); box-shadow: 0 20px 60px rgba(0, 210, 255, 0.5); }

        #right-panel { flex: 1; display: flex; flex-direction: column; align-items: center; }
        #arya-logo { width: 480px; filter: drop-shadow(0 0 15px rgba(0,0,0,0.1)); }
        
        #tagline { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 28px; letter-spacing: 10px; margin-top: 30px;
            background: linear-gradient(to right, #ff00ff, #00d2ff, #ff00ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 200% auto; animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        /* MODALS */
        .modal {
            position: fixed; inset: 0; display: none; 
            align-items: center; justify-content: center; z-index: 100;
            backdrop-filter: blur(20px) brightness(1.1);
        }

        .modal-content {
            background: #fff; padding: 80px; border-radius: 50px; text-align: center; max-width: 60%;
            border: 4px solid #333; box-shadow: 0 30px 100px rgba(0,0,0,0.2);
        }

        #win-modal .modal-content { border-color: var(--win-gold); }
        #lose-modal .modal-content { border-color: var(--lose-pink); }

        #prize-text {
            font-size: 90px; margin: 20px 0; font-family: 'Poppins'; font-weight: 900;
            color: #222; text-transform: uppercase;
        }

        /* EFFECTS */
        .glitch-screen { animation: shake 0.2s 5; filter: invert(0.1); }
        @keyframes shake {
            0%, 100% { transform: translate(0,0); }
            25% { transform: translate(8px, 8px); }
            75% { transform: translate(-8px, -8px); }
        }

        .btn-action {
            margin-top: 30px; padding: 20px 60px; border-radius: 100px;
            border: none; color: #fff; font-family: 'Orbitron'; font-weight: 900;
            font-size: 20px; cursor: pointer; text-transform: uppercase;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div id="game-layout">
        <div id="left-panel">
            <div id="wheel-wrapper">
                <div id="wheel-outer-ring">
                    <div id="pointer"></div>
                    <div id="center-pin">ARYA</div>
                    <canvas id="wheel" width="800" height="800"></canvas>
                </div>
            </div>
            <button id="spin-btn">PRESS TO SPIN</button>
        </div>

        <div id="right-panel">
            <img id="arya-logo" src="logo.png" alt="ARYA PHARMALAB">
            <p id="tagline">REINVENTING LIVES</p>
            
            <div style="margin-top: 40px; padding: 12px 35px; border-radius: 50px; background: #1a1a1a; border: 2px solid var(--primary-glow); box-shadow: 0 0 20px rgba(0,229,255,0.4);">
                <span style="color: #ffffff; font-family: 'Orbitron'; font-size: 18px; font-weight: 700; letter-spacing: 4px;">SINCE 1994</span>
            </div>
            
                   </div>
    </div>

    <div id="win-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: #f57c00; font-family: 'Orbitron'; letter-spacing: 5px; font-size: 24px;">REWARD UNLOCKED</h2>
            <h1 id="prize-text">PRIZE</h1>
            <button class="btn-action" style="background: #222;" onclick="closeModals()">CLAIM GIFT</button>
        </div>
    </div>

    <div id="lose-modal" class="modal">
        <div class="modal-content">
            <h1 style="font-size: 70px; color: var(--lose-pink); font-family: 'Orbitron';">OH NO!</h1>
            <p style="font-size: 20px; color: #444;">Better luck on the next rotation!</p>
            <button class="btn-action" style="background: var(--lose-pink);" onclick="closeModals()">SPIN AGAIN</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        
        const sectors = [
            { label: "TRY AGAIN", color: "#222", text: "#fff" },
            { label: "XTREME ENERGY", color: "#00e5ff", text: "#000" }, // Black text for maximum visibility
            { label: "MAX TIGER", color: "#ff00ff", text: "#fff" },
            { label: "JELLY JUICE", color: "#ffc107", text: "#000" },
            { label: "EYE MASK", color: "#ab47bc", text: "#fff" }
        ];

        const tot = sectors.length;
        const rad = canvas.width / 2;
        const arc = (Math.PI * 2) / tot;
        let currentRotation = 0;
        let isSpinning = false;
        let winInterval;

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(rad, rad);
            ctx.rotate(currentRotation);
            ctx.translate(-rad, -rad);
            
            sectors.forEach((s, i) => {
                const a = arc * i;
                ctx.beginPath();
                ctx.fillStyle = s.color;
                ctx.moveTo(rad, rad);
                ctx.arc(rad, rad, rad, a, a + arc);
                ctx.fill();
                
                ctx.strokeStyle = "#fff";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(rad, rad);
                ctx.rotate(a + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = s.text; 
                // Adjusted font size for "XTREME ENERGY" fit
                ctx.font = "bold 34px Poppins";
                ctx.fillText(s.label, rad - 50, 12);
                ctx.restore();
            });
            ctx.restore();
        }

        function animateSpin(startAngle, endAngle, duration) {
            let startTime = null;
            function step(timestamp) {
                if (!startTime) startTime = timestamp;
                let progress = (timestamp - startTime) / duration;
                if (progress > 1) progress = 1;
                
                // Smooth ease-out
                const easing = 1 - Math.pow(1 - progress, 4);
                currentRotation = startAngle + (endAngle - startAngle) * easing;
                
                draw();
                if (progress < 1) {
                    requestAnimationFrame(step);
                } else {
                    isSpinning = false;
                    const finalNorm = (1.5 * Math.PI - (currentRotation % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
                    const idx = Math.floor(finalNorm / arc);
                    
                    if (sectors[idx].label === "TRY AGAIN") {
                        document.body.classList.add('glitch-screen');
                        setTimeout(() => {
                            document.body.classList.remove('glitch-screen');
                            document.getElementById('lose-modal').style.display = 'flex';
                        }, 600);
                    } else {
                        triggerFirecrackers(sectors[idx].label);
                    }
                }
            }
            requestAnimationFrame(step);
        }

        document.getElementById('spin-btn').addEventListener('click', () => {
            if (isSpinning) return;
            isSpinning = true;
            
            // FULLY RANDOM LOGIC - No logic-gate for first 10 spins
            const targetIdx = Math.floor(Math.random() * tot);
            
            const pointerPos = 1.5 * Math.PI;
            const targetSectorCenter = targetIdx * arc + (arc / 2);
            const finalStopAngle = (pointerPos - targetSectorCenter);
            const startAngle = currentRotation;
            
            // Spins at least 10 times before stopping
            const endAngle = startAngle + (Math.PI * 20) + (finalStopAngle - (startAngle % (Math.PI * 2)));

            animateSpin(startAngle, endAngle, 5000); 
        });

        function triggerFirecrackers(prize) {
            const end = Date.now() + 4000;
            const colors = ['#ff00ff', '#00e5ff', '#ffca28', '#32cd32'];

            (function frame() {
                confetti({
                    particleCount: 7,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 7,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());

            document.getElementById('prize-text').innerText = prize;
            document.getElementById('win-modal').style.display = 'flex';
        }

        function closeModals() {
            document.getElementById('win-modal').style.display = 'none';
            document.getElementById('lose-modal').style.display = 'none';
        }

        draw();
    </script>
</body>
</html>
